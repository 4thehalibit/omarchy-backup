# --------------------------------------------------
# Starship Prompt — Clean Admin / Dev Configuration
# --------------------------------------------------

add_newline = true
command_timeout = 200

# Prompt layout (single line)
format = "$directory$git_branch$git_status$python$character"

# --------------------------------------------------
# Prompt character
# --------------------------------------------------
[character]
success_symbol = "[❯](bold cyan)"
error_symbol   = "[✗](bold red)"
vimcmd_symbol  = "[❮](bold yellow)"

# --------------------------------------------------
# Directory
# --------------------------------------------------
[directory]
style = "bold blue"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"
read_only = " "
read_only_style = "bold red"

# --------------------------------------------------
# Git
# --------------------------------------------------
[git_branch]
symbol = " "
style = "bold cyan"
format = "[$symbol$branch]($style) "

[git_status]
style = "yellow"
format = "[$all_status]($style)"

ahead      = "⇡${count} "
behind     = "⇣${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
conflicted = " "
untracked  = "? "
modified   = " "
staged     = "● "
renamed    = "➜ "
deleted    = "✗ "
stashed    = "⚑ "
up_to_date = " "

# --------------------------------------------------
# Python (critical for your workflow)
# --------------------------------------------------
[python]
symbol = "🐍 "
style = "bold green"
format = "[$symbol$virtualenv]($style) "

# --------------------------------------------------
# Command duration (only shows when slow)
# --------------------------------------------------
[cmd_duration]
min_time = 2000
style = "dimmed white"

