
###############################################################################
# Hyprland Monitor Configuration
###############################################################################

# IMPORTANT:
# Do NOT enable auto layout fallback
# monitor=,preferred,auto,auto


###############################################################################
# HOME SETUP (ViewSonic 4K)
###############################################################################

# Home 4K ViewSonic — left monitor
monitor=desc:VX3211-4K,3840x2160@60,0x0,1.5,transform,0

# Laptop at home — positioned after ViewSonic's full 3840px physical width
monitor=eDP-1,2560x1600@165,3840x440,1.6,transform,0


###############################################################################
# OFFICE SETUP
# Run 'hyprctl keyword monitor "eDP-1,2560x1600@165,1920x-580,1.6"'
# when switching to office layout
###############################################################################

# Bottom office monitor
monitor=desc:VC42235Q2258,1920x1080@60,0x0,1,transform,0

# Top office monitor, flipped 180°, stacked above bottom
monitor=DP-10,1920x1080@60,0x-1080,1,transform,2


###############################################################################
# END OF FILE
###############################################################################
